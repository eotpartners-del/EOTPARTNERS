<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>الإشعارات | EOT PARTNERS</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Cairo', 'Segoe UI', Tahoma, sans-serif;
      background: #ffffff;
      color: #1a1a1a;
      padding-bottom: 80px;
      min-height: 100vh;
    }

    .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 18px 20px; background: #ffffff; border-bottom: 1px solid rgba(0,0,0,0.04); }
    .logo { font-size: 24px; font-weight: 800; letter-spacing: 2px; color: #1a1a1a; text-decoration: none; }
    .logo span { color: #8b6914; }
    .back-btn { background: none; border: none; color: #8b6914; font-size: 18px; cursor: pointer; padding: 8px; }

    .page-container { max-width: 700px; margin: 0 auto; padding: 20px 16px; }

    .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .page-title { font-size: 18px; font-weight: 800; color: #1a1a1a; }
    .page-title i { color: #8b6914; margin-left: 8px; }
    .mark-all-btn { background: none; border: 1px solid rgba(212,175,55,0.3); color: #8b6914; padding: 8px 16px; border-radius: 20px; font-size: 11px; cursor: pointer; font-weight: 600; transition: 0.2s; font-family: inherit; }
    .mark-all-btn:hover { background: rgba(212,175,55,0.05); }

    .notif-card { background: #fff; border: 1px solid rgba(0,0,0,0.06); border-radius: 14px; padding: 16px; margin-bottom: 10px; display: flex; align-items: flex-start; gap: 12px; cursor: pointer; transition: 0.2s; }
    .notif-card:hover { border-color: rgba(212,175,55,0.3); box-shadow: 0 2px 10px rgba(212,175,55,0.05); }
    .notif-card.unread { border-right: 3px solid #D4AF37; background: rgba(212,175,55,0.02); }
    .notif-card.read { opacity: 0.7; }
    .notif-dot { width: 10px; height: 10px; border-radius: 50%; background: #D4AF37; flex-shrink: 0; margin-top: 4px; }
    .notif-dot.read-dot { background: #ccc; }
    .notif-content { flex: 1; }
    .notif-title { font-weight: 700; font-size: 13px; color: #1a1a1a; margin-bottom: 4px; }
    .notif-text { font-size: 11px; color: #666; line-height: 1.6; margin-bottom: 6px; }
    .notif-date { font-size: 9px; color: #999; }
    .notif-status { font-size: 9px; padding: 3px 10px; border-radius: 10px; font-weight: 600; }
    .notif-status.new { background: rgba(212,175,55,0.1); color: #8b6914; }
    .notif-status.seen { background: rgba(0,0,0,0.03); color: #999; }

    .empty-state { text-align: center; padding: 60px 20px; }
    .empty-state i { font-size: 48px; color: #ccc; margin-bottom: 16px; display: block; }
    .empty-state h3 { font-size: 16px; color: #999; margin-bottom: 8px; }
    .empty-state p { font-size: 12px; color: #bbb; }

    .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(255,255,255,0.9); backdrop-filter: blur(20px); border-top: 1px solid rgba(212,175,55,0.15); display: flex; justify-content: space-around; padding: 8px 12px 18px; z-index: 200; }
    .bottom-item { display: flex; flex-direction: column; align-items: center; gap: 5px; color: #1a1a1a; text-decoration: none; font-size: 10px; font-weight: 600; padding: 8px 12px; border-radius: 14px; transition: 0.3s; }
    .bottom-item i { font-size: 20px; }
    .bottom-item.active { color: #5c4700; background: rgba(212,175,55,0.1); }
    .bottom-item:hover { color: #5c4700; }

    @media (max-width: 768px) {
      .page-container { padding: 16px 12px; }
    }
  </style>
</head>
<body>

<div class="top-bar">
  <a href="dashboard.html" class="back-btn"><i class="fas fa-arrow-right"></i></a>
  <a href="dashboard.html" class="logo">EOT<span> PARTNERS</span></a>
  <div style="width:34px;"></div>
</div>

<div class="page-container">

  <div class="page-header">
    <div class="page-title"><i class="fas fa-bell"></i> جميع الإشعارات</div>
    <button class="mark-all-btn" onclick="markAllRead()"><i class="fas fa-check-double"></i> تحديد الكل كمقروء</button>
  </div>

  <div id="notificationsContainer"></div>

</div>

<div class="bottom-nav" id="bottomNav">
  <a href="dashboard.html" class="bottom-item"><i class="fas fa-home"></i><span>الرئيسية</span></a>
  <a href="invest.html" class="bottom-item"><i class="fas fa-chart-line"></i><span>استثمار</span></a>
  <a href="partnership.html" class="bottom-item"><i class="fas fa-handshake"></i><span>شراكة</span></a>
  <a href="wallet.html" class="bottom-item"><i class="fas fa-wallet"></i><span>محفظتي</span></a>
  <a href="notifications.html" class="bottom-item active"><i class="fas fa-bell"></i><span>الإشعارات</span></a>
</div>

<script>
  const SESSION_KEY = 'eot_session';
  const NOTIFICATIONS_KEY = 'eot_notifications';

  function getSession() { return JSON.parse(localStorage.getItem(SESSION_KEY)); }

  function getNotifications() {
    const s = getSession();
    if (s) {
      const all = JSON.parse(localStorage.getItem(NOTIFICATIONS_KEY)) || [];
      return all.filter(n => n.user === s.email || n.user === 'all');
    }
    return [];
  }

  function loadNotifications() {
    const container = document.getElementById('notificationsContainer');
    const notifs = getNotifications().reverse();

    if (notifs.length === 0) {
      container.innerHTML = `
        <div class="empty-state">
          <i class="fas fa-bell-slash"></i>
          <h3>لا توجد إشعارات</h3>
          <p>ستظهر هنا جميع الإشعارات الجديدة</p>
        </div>
      `;
      return;
    }

    container.innerHTML = notifs.map((n, i) => `
      <div class="notif-card ${n.read ? 'read' : 'unread'}" onclick="markRead(${notifs.length - 1 - i})">
        <div class="notif-dot ${n.read ? 'read-dot' : ''}"></div>
        <div class="notif-content">
          <div class="notif-title">${n.title || 'إشعار'}</div>
          <div class="notif-text">${n.message || n.text || ''}</div>
          <div class="notif-date">${n.date || ''}</div>
        </div>
        <span class="notif-status ${n.read ? 'seen' : 'new'}">${n.read ? 'مقروء' : 'جديد'}</span>
      </div>
    `).join('');
  }

  function markRead(index) {
    const s = getSession();
    if (!s) return;
    const all = JSON.parse(localStorage.getItem(NOTIFICATIONS_KEY)) || [];
    const userNotifs = all.filter(n => n.user === s.email || n.user === 'all');
    const target = userNotifs[index];
    if (target) {
      const realIndex = all.findIndex(n => n === target);
      if (realIndex !== -1) {
        all[realIndex].read = true;
        localStorage.setItem(NOTIFICATIONS_KEY, JSON.stringify(all));
        loadNotifications();
      }
    }
  }

  function markAllRead() {
    const s = getSession();
    if (!s) return;
    const all = JSON.parse(localStorage.getItem(NOTIFICATIONS_KEY)) || [];
    all.forEach(n => {
      if (n.user === s.email || n.user === 'all') {
        n.read = true;
      }
    });
    localStorage.setItem(NOTIFICATIONS_KEY, JSON.stringify(all));
    loadNotifications();
  }

  // ========== Theme ==========
  function applyTheme() {
    const theme = localStorage.getItem('theme');

    const topLogo = document.querySelector('.top-bar .logo');
    if (topLogo) {
      if (theme === 'dark') {
        topLogo.style.color = '#FFFFFF';
        const span = topLogo.querySelector('span');
        if (span) span.style.color = '#D4AF37';
      } else {
        topLogo.style.color = '#1a1a1a';
        const span = topLogo.querySelector('span');
        if (span) span.style.color = '#8b6914';
      }
    }

    if (theme === 'dark') {
      document.body.style.background = '#0a0e14'; document.body.style.color = '#E8EDF2';
      document.querySelector('.top-bar').style.background = '#0a0e14';
      document.querySelectorAll('.page-title').forEach(el => { el.style.color = '#FFF'; });
      document.querySelectorAll('.notif-card').forEach(el => { el.style.background = '#111620'; el.style.borderColor = 'rgba(255,255,255,0.05)'; });
      document.querySelectorAll('.notif-card.unread').forEach(el => { el.style.background = 'rgba(212,175,55,0.03)'; });
      document.querySelectorAll('.notif-title').forEach(el => { el.style.color = '#FFF'; });
      document.querySelectorAll('.notif-text').forEach(el => { el.style.color = '#A09070'; });
      document.querySelectorAll('.notif-date').forEach(el => { el.style.color = '#666'; });
      document.querySelectorAll('.notif-status.new').forEach(el => { el.style.background = 'rgba(212,175,55,0.1)'; el.style.color = '#D4AF37'; });
      document.querySelectorAll('.notif-status.seen').forEach(el => { el.style.background = 'rgba(255,255,255,0.03)'; el.style.color = '#666'; });
      document.querySelectorAll('.bottom-nav').forEach(el => { el.style.background = 'rgba(10,14,20,0.95)'; el.style.borderTopColor = 'rgba(212,175,55,0.1)'; });
      document.querySelectorAll('.bottom-item').forEach(el => { el.style.color = '#FFF'; });
      document.querySelectorAll('.bottom-item.active').forEach(el => { el.style.color = '#D4AF37'; el.style.background = 'rgba(212,175,55,0.1)'; });
      document.querySelectorAll('.back-btn').forEach(el => { el.style.color = '#D4AF37'; });
      document.querySelectorAll('.mark-all-btn').forEach(el => { el.style.color = '#D4AF37'; el.style.borderColor = 'rgba(212,175,55,0.3)'; });
    } else {
      document.body.style.background = '#ffffff'; document.body.style.color = '#1a1a1a';
      document.querySelector('.top-bar').style.background = '#ffffff';
      document.querySelectorAll('.page-title').forEach(el => { el.style.color = '#1a1a1a'; });
      document.querySelectorAll('.notif-card').forEach(el => { el.style.background = '#ffffff'; el.style.borderColor = 'rgba(0,0,0,0.06)'; });
      document.querySelectorAll('.notif-card.unread').forEach(el => { el.style.background = 'rgba(212,175,55,0.02)'; });
      document.querySelectorAll('.notif-title').forEach(el => { el.style.color = '#1a1a1a'; });
      document.querySelectorAll('.notif-text').forEach(el => { el.style.color = '#666'; });
      document.querySelectorAll('.notif-date').forEach(el => { el.style.color = '#999'; });
      document.querySelectorAll('.notif-status.new').forEach(el => { el.style.background = 'rgba(212,175,55,0.1)'; el.style.color = '#8b6914'; });
      document.querySelectorAll('.notif-status.seen').forEach(el => { el.style.background = 'rgba(0,0,0,0.03)'; el.style.color = '#999'; });
      document.querySelectorAll('.bottom-nav').forEach(el => { el.style.background = 'rgba(255,255,255,0.9)'; el.style.borderTopColor = 'rgba(212,175,55,0.15)'; });
      document.querySelectorAll('.bottom-item').forEach(el => { el.style.color = '#1a1a1a'; });
      document.querySelectorAll('.bottom-item.active').forEach(el => { el.style.color = '#5c4700'; el.style.background = 'rgba(212,175,55,0.1)'; });
      document.querySelectorAll('.back-btn').forEach(el => { el.style.color = '#8b6914'; });
      document.querySelectorAll('.mark-all-btn').forEach(el => { el.style.color = '#8b6914'; el.style.borderColor = 'rgba(212,175,55,0.3)'; });
    }
  }

  window.onload = function() {
    const session = getSession();
    if (!session) { window.location.href = 'login.html'; return; }
    applyTheme();
    loadNotifications();
  };
</script>

</body>
</html>
