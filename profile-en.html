<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile | EOT PARTNERS</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="firebase-config.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { overflow-x: hidden; width: 100%; max-width: 100vw; }
    body {
      font-family: 'Cairo', 'Segoe UI', Tahoma, sans-serif;
      background: #0a0e14;
      color: #E8EDF2;
      min-height: 100vh;
      padding-bottom: 20px;
    }

    .top-bar {
      display: flex; justify-content: space-between; align-items: center;
      padding: 16px 20px; background: #0a0e14;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      position: sticky; top: 0; z-index: 100;
    }
    .back-btn {
      width: 40px; height: 40px; background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1); border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      color: #D4AF37; font-size: 18px; cursor: pointer;
      transition: 0.3s; text-decoration: none;
    }
    .back-btn:hover { background: rgba(212,175,55,0.15); }
    .logo { font-size: 22px; font-weight: 800; letter-spacing: 2px; color: #FFFFFF; text-decoration: none; }
    .logo span { color: #D4AF37; }

    .page-container { max-width: 650px; margin: 0 auto; padding: 20px 14px; }

    .profile-hero {
      background: linear-gradient(135deg, #111620 0%, #1a1f2b 100%);
      border: 1px solid rgba(212,175,55,0.15); border-radius: 24px;
      padding: 30px 20px; text-align: center; margin-bottom: 16px;
      position: relative; overflow: hidden;
    }
    .profile-hero::before {
      content: ''; position: absolute; top: -40px; right: -40px;
      width: 100px; height: 100px; background: rgba(212,175,55,0.04);
      border-radius: 50%;
    }
    .profile-hero::after {
      content: ''; position: absolute; bottom: -30px; left: -30px;
      width: 80px; height: 80px; background: rgba(212,175,55,0.03);
      border-radius: 50%;
    }
    .avatar-wrapper {
      position: relative; display: inline-block; cursor: pointer;
      margin-bottom: 12px; z-index: 1;
    }
    .avatar-circle {
      width: 90px; height: 90px; background: #1a1f2b;
      border: 3px solid rgba(212,175,55,0.4); border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 40px; font-weight: 800; color: #D4AF37;
      overflow: hidden; transition: 0.3s;
    }
    .avatar-circle:hover { border-color: #D4AF37; }
    .avatar-circle img { width: 100%; height: 100%; object-fit: cover; }
    .avatar-camera {
      position: absolute; bottom: 2px; left: 2px;
      width: 28px; height: 28px; background: #D4AF37;
      border-radius: 50%; display: flex; align-items: center;
      justify-content: center; color: #000; font-size: 12px;
      border: 2px solid #0a0e14;
    }
    .profile-hero h2 { font-size: 22px; color: #FFF; z-index: 1; position: relative; }
    .profile-hero .member-id {
      font-size: 11px; color: #A09070; margin-top: 4px;
      z-index: 1; position: relative;
    }
    .profile-hero .member-id span { color: #D4AF37; font-weight: 600; }

    .section-card {
      background: #111620; border: 1px solid rgba(212,175,55,0.15);
      border-radius: 18px; padding: 20px; margin-bottom: 14px;
    }
    .section-title {
      font-size: 15px; font-weight: 700; color: #D4AF37;
      margin-bottom: 16px; display: flex; align-items: center; gap: 8px;
    }
    .section-title i { color: #D4AF37; font-size: 16px; }

    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
    .form-group { margin-bottom: 12px; }
    .form-group label {
      display: block; font-size: 11px; color: #A09070;
      margin-bottom: 6px; font-weight: 600;
    }
    .form-group label i { margin-right: 6px; color: #D4AF37; font-size: 10px; }
    .form-group input, .form-group select {
      width: 100%; padding: 12px 14px;
      background: #0a0e14; border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px; color: #FFF; font-size: 13px;
      font-family: inherit; transition: 0.3s;
    }
    .form-group input:focus, .form-group select:focus {
      outline: none; border-color: #D4AF37;
    }
    .phone-row { display: flex; gap: 8px; }
    .phone-code { width: 130px !important; flex-shrink: 0; }

    .save-btn {
      width: 100%; padding: 14px; background: linear-gradient(135deg, #D4AF37, #b8941f);
      border: none; border-radius: 12px; color: #000; font-weight: 800;
      font-size: 14px; cursor: pointer; font-family: inherit;
      transition: 0.3s; margin-top: 8px;
    }
    .save-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(212,175,55,0.25); }

    .verification-status {
      display: flex; align-items: center; gap: 10px;
      padding: 14px 16px; border-radius: 12px; margin-bottom: 14px;
      font-size: 13px; font-weight: 600;
    }
    .verification-status.pending { background: rgba(234,179,8,0.1); border: 1px solid rgba(234,179,8,0.3); color: #EAB308; }
    .verification-status.approved { background: rgba(74,222,128,0.1); border: 1px solid rgba(74,222,128,0.3); color: #4ADE80; }
    .verification-status.rejected { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); color: #EF4444; }
    .verification-status.none { background: rgba(156,163,175,0.1); border: 1px solid rgba(156,163,175,0.2); color: #9CA3AF; }
    .verification-status i { font-size: 18px; }
    .verification-status .status-text { flex: 1; }
    .verification-status .status-label { font-size: 10px; opacity: 0.7; }

    .upload-box {
      border: 2px dashed rgba(212,175,55,0.25); border-radius: 14px;
      padding: 24px; text-align: center; cursor: pointer;
      transition: 0.3s; background: rgba(255,255,255,0.01);
    }
    .upload-box:hover { border-color: #D4AF37; background: rgba(212,175,55,0.03); }
    .upload-box i { font-size: 36px; color: #D4AF37; margin-bottom: 10px; display: block; }
    .upload-box p { font-size: 12px; color: #A09070; }
    .upload-box .file-name { font-size: 11px; color: #D4AF37; margin-top: 6px; font-weight: 600; }

    .toast {
      position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
      background: #1a1f2b; border: 1px solid #D4AF37; color: #FFF;
      padding: 12px 24px; border-radius: 30px; font-size: 12px;
      font-weight: 600; z-index: 999; display: none; white-space: nowrap;
    }

    @media (max-width: 600px) {
      .form-row { grid-template-columns: 1fr; }
      .profile-hero h2 { font-size: 18px; }
    }
  </style>
</head>
<body>

<div class="top-bar">
  <a href="dashboard-en.html" class="back-btn"><i class="fas fa-arrow-left"></i></a>
  <a href="dashboard-en.html" class="logo">EOT<span> PARTNERS</span></a>
  <div style="width:40px;"></div>
</div>

<div class="page-container">

  <!-- Profile Avatar & Name -->
  <div class="profile-hero">
    <div class="avatar-wrapper" onclick="document.getElementById('avatarInput').click()">
      <div class="avatar-circle" id="avatarCircle">
        <span id="avatarLetter">I</span>
        <img id="avatarImg" src="" style="display:none;">
      </div>
      <div class="avatar-camera"><i class="fas fa-camera"></i></div>
    </div>
    <input type="file" id="avatarInput" accept="image/*" style="display:none;" onchange="handleAvatar(event)">
    <h2 id="displayName">Investor</h2>
    <div class="member-id">Member ID: <span id="memberId">---</span></div>
  </div>

  <!-- Personal Information -->
  <div class="section-card">
    <div class="section-title"><i class="fas fa-id-card"></i> Personal Information</div>
    <div class="form-row">
      <div class="form-group">
        <label><i class="fas fa-user"></i> First Name</label>
        <input type="text" id="firstName" placeholder="First name">
      </div>
      <div class="form-group">
        <label><i class="fas fa-user"></i> Last Name</label>
        <input type="text" id="lastName" placeholder="Last name">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label><i class="fas fa-envelope"></i> Email</label>
        <input type="email" id="email" placeholder="example@email.com">
      </div>
      <div class="form-group">
        <label><i class="fas fa-calendar-alt"></i> Date of Birth</label>
        <input type="date" id="birthDate">
      </div>
    </div>
    <div class="form-group">
      <label><i class="fas fa-phone-alt"></i> Phone Number</label>
      <div class="phone-row">
        <select id="countryCode" class="phone-code">
          <option value="+54">Argentina +54</option><option value="+61">Australia +61</option><option value="+43">Austria +43</option><option value="+973">Bahrain +973</option><option value="+32">Belgium +32</option><option value="+55">Brazil +55</option><option value="+44">Britain +44</option><option value="+1">Canada +1</option><option value="+56">Chile +56</option><option value="+57">Colombia +57</option><option value="+420">Czech +420</option><option value="+45">Denmark +45</option><option value="+20">Egypt +20</option><option value="+358">Finland +358</option><option value="+33">France +33</option><option value="+49">Germany +49</option><option value="+30">Greece +30</option><option value="+31">Holland +31</option><option value="+964">Iraq +964</option><option value="+353">Ireland +353</option><option value="+39">Italy +39</option><option value="+962">Jordan +962</option><option value="+965">Kuwait +965</option><option value="+961">Lebanon +961</option><option value="+218">Libya +218</option><option value="+52">Mexico +52</option><option value="+212">Morocco +212</option><option value="+64">New Zealand +64</option><option value="+47">Norway +47</option><option value="+968">Oman +968</option><option value="+970">Palestine +970</option><option value="+48">Poland +48</option><option value="+351">Portugal +351</option><option value="+974">Qatar +974</option><option value="+40">Romania +40</option><option value="+7">Russia +7</option><option value="+966">Saudi Arabia +966</option><option value="+34">Spain +34</option><option value="+249">Sudan +249</option><option value="+46">Sweden +46</option><option value="+41">Switzerland +41</option><option value="+963">Syria +963</option><option value="+216">Tunisia +216</option><option value="+90">Turkey +90</option><option value="+380">Ukraine +380</option><option value="+971">UAE +971</option><option value="+1">USA +1</option><option value="+967">Yemen +967</option><option value="+213">Algeria +213</option>
        </select>
        <input type="tel" id="phone" placeholder="Phone number" style="flex:1;">
      </div>
    </div>
  </div>

  <!-- Address -->
  <div class="section-card">
    <div class="section-title"><i class="fas fa-map-marker-alt"></i> Address</div>
    <div class="form-group">
      <label><i class="fas fa-road"></i> Street Address</label>
      <input type="text" id="street" placeholder="Street name and building number">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label><i class="fas fa-city"></i> City</label>
        <input type="text" id="city" placeholder="City">
      </div>
      <div class="form-group">
        <label><i class="fas fa-mail-bulk"></i> Postal Code</label>
        <input type="text" id="postalCode" placeholder="Postal code">
      </div>
    </div>
    <div class="form-group">
      <label><i class="fas fa-globe"></i> Country</label>
      <select id="country">
        <option value="">Select country</option>
        <option value="AR">Argentina</option><option value="AU">Australia</option><option value="AT">Austria</option><option value="BH">Bahrain</option><option value="BE">Belgium</option><option value="BR">Brazil</option><option value="GB">Britain</option><option value="CA">Canada</option><option value="CL">Chile</option><option value="CO">Colombia</option><option value="CZ">Czech</option><option value="DK">Denmark</option><option value="EG">Egypt</option><option value="FI">Finland</option><option value="FR">France</option><option value="DE">Germany</option><option value="GR">Greece</option><option value="NL">Holland</option><option value="IQ">Iraq</option><option value="IE">Ireland</option><option value="IT">Italy</option><option value="JO">Jordan</option><option value="KW">Kuwait</option><option value="LB">Lebanon</option><option value="LY">Libya</option><option value="MX">Mexico</option><option value="MA">Morocco</option><option value="NZ">New Zealand</option><option value="NO">Norway</option><option value="OM">Oman</option><option value="PS">Palestine</option><option value="PL">Poland</option><option value="PT">Portugal</option><option value="QA">Qatar</option><option value="RO">Romania</option><option value="RU">Russia</option><option value="SA">Saudi Arabia</option><option value="ES">Spain</option><option value="SD">Sudan</option><option value="SE">Sweden</option><option value="CH">Switzerland</option><option value="SY">Syria</option><option value="TN">Tunisia</option><option value="TR">Turkey</option><option value="UA">Ukraine</option><option value="AE">UAE</option><option value="US">USA</option><option value="YE">Yemen</option><option value="DZ">Algeria</option>
      </select>
    </div>
  </div>

  <button class="save-btn" onclick="saveProfile()"><i class="fas fa-save"></i> Save Changes</button>

  <!-- Account Verification -->
  <div class="section-card" style="margin-top:14px;">
    <div class="section-title"><i class="fas fa-shield-alt"></i> Account Verification</div>

    <div class="verification-status" id="verificationStatus">
      <i class="fas fa-info-circle"></i>
      <div class="status-text">
        <div class="status-label">Verification Status</div>
        <div id="verificationLabel">Not verified yet</div>
      </div>
    </div>

    <div class="upload-box" onclick="document.getElementById('idInput').click()">
      <i class="fas fa-cloud-upload-alt"></i>
      <p>Click here to upload ID or Passport</p>
      <p style="font-size:10px;color:#777;">PDF, JPG, PNG - Max 5MB</p>
      <div class="file-name" id="idFileName"></div>
    </div>
    <input type="file" id="idInput" accept=".pdf,.jpg,.jpeg,.png" style="display:none;" onchange="handleIdUpload(event)">
  </div>

</div>

<div class="toast" id="toast"></div>
<script>
  // ========== Firebase Functions ==========
  function getUserId() {
    const session = JSON.parse(localStorage.getItem('eot_session'));
    return session ? session.id : null;
  }

  async function getUserData() {
    const uid = getUserId();
    if (!uid) return null;
    const doc = await firebase.firestore().collection('users').doc(uid).get();
    return doc.exists ? doc.data() : null;
  }

  async function saveUserData(data) {
    const uid = getUserId();
    if (!uid) return;
    await firebase.firestore().collection('users').doc(uid).update(data);
  }

  const SESSION_KEY = 'eot_session';
  const VERIFICATION_KEY = 'eot_verification';
  let currentVerificationStatus = 'none';

  function showToast(msg, isError = false) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.style.background = isError ? '#7F1D1D' : '#1a1f2b';
    t.style.borderColor = isError ? '#EF4444' : '#D4AF37';
    t.style.display = 'block';
    setTimeout(() => { t.style.display = 'none'; }, 3000);
  }

  // ========== Avatar ==========
  function handleAvatar(event) {
    const file = event.target.files[0];
    if (!file) return;
    if (!file.type.startsWith('image/')) { showToast('Please select a valid image', true); return; }
    if (file.size > 2 * 1024 * 1024) { showToast('Image size must not exceed 2MB', true); return; }
    const reader = new FileReader();
    reader.onload = function(e) {
      document.getElementById('avatarImg').src = e.target.result;
      document.getElementById('avatarImg').style.display = 'block';
      document.getElementById('avatarLetter').style.display = 'none';
      saveUserData({ 'profile.avatar': e.target.result });
      showToast('Profile picture uploaded successfully');
    };
    reader.readAsDataURL(file);
  }

  // ========== ID Upload ==========
  function handleIdUpload(event) {
    const file = event.target.files[0];
    if (!file) return;
    if (file.size > 5 * 1024 * 1024) { showToast('File size must not exceed 5MB', true); return; }
    document.getElementById('idFileName').textContent = '📄 ' + file.name;
    const reader = new FileReader();
    reader.onload = async function(e) {
      const verification = {
        status: 'pending',
        documentName: file.name,
        documentData: e.target.result,
        uploadDate: new Date().toLocaleDateString('en-US'),
        uploadTime: new Date().toLocaleTimeString('en-US'),
        email: JSON.parse(localStorage.getItem(SESSION_KEY))?.email || ''
      };
      localStorage.setItem(VERIFICATION_KEY, JSON.stringify(verification));
      await saveUserData({ 'verification.status': 'pending' });
      currentVerificationStatus = 'pending';
      updateVerificationUI();
      showToast('ID document uploaded successfully. Status: Pending Review');
    };
    reader.readAsDataURL(file);
  }

  // ========== Verification UI ==========
  function updateVerificationUI() {
    const container = document.getElementById('verificationStatus');
    container.className = 'verification-status';
    switch (currentVerificationStatus) {
      case 'pending':
        container.classList.add('pending');
        container.innerHTML = '<i class="fas fa-clock"></i><div class="status-text"><div class="status-label">Verification Status</div><div>Pending Review</div></div>';
        break;
      case 'approved':
        container.classList.add('approved');
        container.innerHTML = '<i class="fas fa-check-circle"></i><div class="status-text"><div class="status-label">Verification Status</div><div>Approved - Verified Account</div></div>';
        break;
      case 'rejected':
        container.classList.add('rejected');
        container.innerHTML = '<i class="fas fa-times-circle"></i><div class="status-text"><div class="status-label">Verification Status</div><div>Rejected - Please try again</div></div>';
        break;
      default:
        container.classList.add('none');
        container.innerHTML = '<i class="fas fa-info-circle"></i><div class="status-text"><div class="status-label">Verification Status</div><div>Not verified yet</div></div>';
    }
  }

  // ========== Save Profile ==========
  async function saveProfile() {
    const profile = {
      firstName: document.getElementById('firstName').value.trim(),
      lastName: document.getElementById('lastName').value.trim(),
      email: document.getElementById('email').value.trim(),
      birthDate: document.getElementById('birthDate').value,
      phone: document.getElementById('phone').value.trim(),
      countryCode: document.getElementById('countryCode').value,
      street: document.getElementById('street').value.trim(),
      city: document.getElementById('city').value.trim(),
      postalCode: document.getElementById('postalCode').value.trim(),
      country: document.getElementById('country').value
    };

    await saveUserData({ profile: profile });

    const session = JSON.parse(localStorage.getItem(SESSION_KEY));
    if (session) {
      session.firstName = profile.firstName;
      session.lastName = profile.lastName;
      session.fullName = profile.firstName + ' ' + profile.lastName;
      session.email = profile.email;
      localStorage.setItem(SESSION_KEY, JSON.stringify(session));
    }

    updateDisplayName();
    showToast('All changes saved successfully');
  }

  // ========== Update Display ==========
  function updateDisplayName() {
    const session = JSON.parse(localStorage.getItem(SESSION_KEY)) || {};
    const fullName = session.fullName || 'Investor';
    document.getElementById('displayName').textContent = fullName;
    document.getElementById('avatarLetter').textContent = fullName.charAt(0);
  }

  // ========== Load Profile ==========
  async function loadProfile() {
    const userData = await getUserData();
    const profile = userData?.profile || {};
    const session = JSON.parse(localStorage.getItem(SESSION_KEY)) || {};

    document.getElementById('firstName').value = profile.firstName || session.firstName || '';
    document.getElementById('lastName').value = profile.lastName || session.lastName || '';
    document.getElementById('email').value = profile.email || session.email || '';
    document.getElementById('birthDate').value = profile.birthDate || '';
    document.getElementById('phone').value = profile.phone || '';
    document.getElementById('countryCode').value = profile.countryCode || '+966';
    document.getElementById('street').value = profile.street || '';
    document.getElementById('city').value = profile.city || '';
    document.getElementById('postalCode').value = profile.postalCode || '';
    document.getElementById('country').value = profile.country || '';

    const memberId = session.id ? session.id.substring(0, 8).toUpperCase() : '---';
    document.getElementById('memberId').textContent = memberId;

    if (profile.avatar) {
      document.getElementById('avatarImg').src = profile.avatar;
      document.getElementById('avatarImg').style.display = 'block';
      document.getElementById('avatarLetter').style.display = 'none';
    }

    updateDisplayName();

    currentVerificationStatus = userData?.verification?.status || 'none';
    updateVerificationUI();

    const verification = JSON.parse(localStorage.getItem(VERIFICATION_KEY));
    if (verification?.documentName) {
      document.getElementById('idFileName').textContent = '📄 ' + verification.documentName;
    }
  }

  window.onload = async function() {
    const session = localStorage.getItem(SESSION_KEY);
    if (!session) { window.location.href = 'login.html'; return; }
    loadProfile();
  };
</script>

</body>
</html>
