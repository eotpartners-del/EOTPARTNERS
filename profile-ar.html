<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>الملف الشخصي | EOT PARTNERS</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="firebase-config.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { overflow-x: hidden; width: 100%; max-width: 100vw; }
    body {
      font-family: 'Cairo', 'Segoe UI', Tahoma, sans-serif;
      background: #0a0e14;
      color: #E8EDF2;
      min-height: 100vh;
      padding-bottom: 20px;
    }

    .top-bar {
      display: flex; justify-content: space-between; align-items: center;
      padding: 16px 20px; background: #0a0e14;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      position: sticky; top: 0; z-index: 100;
    }
    .back-btn {
      width: 40px; height: 40px; background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1); border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      color: #D4AF37; font-size: 18px; cursor: pointer;
      transition: 0.3s; text-decoration: none;
    }
    .back-btn:hover { background: rgba(212,175,55,0.15); }
    .logo { font-size: 22px; font-weight: 800; letter-spacing: 2px; color: #FFFFFF; text-decoration: none; }
    .logo span { color: #D4AF37; }

    .page-container { max-width: 650px; margin: 0 auto; padding: 20px 14px; }

    .profile-hero {
      background: linear-gradient(135deg, #111620 0%, #1a1f2b 100%);
      border: 1px solid rgba(212,175,55,0.15); border-radius: 24px;
      padding: 30px 20px; text-align: center; margin-bottom: 16px;
      position: relative; overflow: hidden;
    }
    .profile-hero::before {
      content: ''; position: absolute; top: -40px; left: -40px;
      width: 100px; height: 100px; background: rgba(212,175,55,0.04);
      border-radius: 50%;
    }
    .profile-hero::after {
      content: ''; position: absolute; bottom: -30px; right: -30px;
      width: 80px; height: 80px; background: rgba(212,175,55,0.03);
      border-radius: 50%;
    }
    .avatar-wrapper {
      position: relative; display: inline-block; cursor: pointer;
      margin-bottom: 12px; z-index: 1;
    }
    .avatar-circle {
      width: 90px; height: 90px; background: #1a1f2b;
      border: 3px solid rgba(212,175,55,0.4); border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 40px; font-weight: 800; color: #D4AF37;
      overflow: hidden; transition: 0.3s;
    }
    .avatar-circle:hover { border-color: #D4AF37; }
    .avatar-circle img { width: 100%; height: 100%; object-fit: cover; }
    .avatar-camera {
      position: absolute; bottom: 2px; right: 2px;
      width: 28px; height: 28px; background: #D4AF37;
      border-radius: 50%; display: flex; align-items: center;
      justify-content: center; color: #000; font-size: 12px;
      border: 2px solid #0a0e14;
    }
    .profile-hero h2 { font-size: 22px; color: #FFF; z-index: 1; position: relative; }
    .profile-hero .member-id {
      font-size: 11px; color: #A09070; margin-top: 4px;
      z-index: 1; position: relative;
    }
    .profile-hero .member-id span { color: #D4AF37; font-weight: 600; }

    .section-card {
      background: #111620; border: 1px solid rgba(212,175,55,0.15);
      border-radius: 18px; padding: 20px; margin-bottom: 14px;
    }
    .section-title {
      font-size: 15px; font-weight: 700; color: #D4AF37;
      margin-bottom: 16px; display: flex; align-items: center; gap: 8px;
    }
    .section-title i { color: #D4AF37; font-size: 16px; }

    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
    .form-group { margin-bottom: 12px; }
    .form-group label {
      display: block; font-size: 11px; color: #A09070;
      margin-bottom: 6px; font-weight: 600;
    }
    .form-group label i { margin-left: 6px; color: #D4AF37; font-size: 10px; }
    .form-group input, .form-group select {
      width: 100%; padding: 12px 14px;
      background: #0a0e14; border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px; color: #FFF; font-size: 13px;
      font-family: inherit; transition: 0.3s;
    }
    .form-group input:focus, .form-group select:focus {
      outline: none; border-color: #D4AF37;
    }
    .phone-row { display: flex; gap: 8px; }
    .phone-code { width: 120px !important; flex-shrink: 0; }

    .save-btn {
      width: 100%; padding: 14px; background: linear-gradient(135deg, #D4AF37, #b8941f);
      border: none; border-radius: 12px; color: #000; font-weight: 800;
      font-size: 14px; cursor: pointer; font-family: inherit;
      transition: 0.3s; margin-top: 8px;
    }
    .save-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(212,175,55,0.25); }

    .verification-status {
      display: flex; align-items: center; gap: 10px;
      padding: 14px 16px; border-radius: 12px; margin-bottom: 14px;
      font-size: 13px; font-weight: 600;
    }
    .verification-status.pending { background: rgba(234,179,8,0.1); border: 1px solid rgba(234,179,8,0.3); color: #EAB308; }
    .verification-status.approved { background: rgba(74,222,128,0.1); border: 1px solid rgba(74,222,128,0.3); color: #4ADE80; }
    .verification-status.rejected { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); color: #EF4444; }
    .verification-status.none { background: rgba(156,163,175,0.1); border: 1px solid rgba(156,163,175,0.2); color: #9CA3AF; }
    .verification-status i { font-size: 18px; }
    .verification-status .status-text { flex: 1; }
    .verification-status .status-label { font-size: 10px; opacity: 0.7; }

    .upload-box {
      border: 2px dashed rgba(212,175,55,0.25); border-radius: 14px;
      padding: 24px; text-align: center; cursor: pointer;
      transition: 0.3s; background: rgba(255,255,255,0.01);
    }
    .upload-box:hover { border-color: #D4AF37; background: rgba(212,175,55,0.03); }
    .upload-box i { font-size: 36px; color: #D4AF37; margin-bottom: 10px; display: block; }
    .upload-box p { font-size: 12px; color: #A09070; }
    .upload-box .file-name { font-size: 11px; color: #D4AF37; margin-top: 6px; font-weight: 600; }

    .toast {
      position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
      background: #1a1f2b; border: 1px solid #D4AF37; color: #FFF;
      padding: 12px 24px; border-radius: 30px; font-size: 12px;
      font-weight: 600; z-index: 999; display: none; white-space: nowrap;
    }

    @media (max-width: 600px) {
      .form-row { grid-template-columns: 1fr; }
      .profile-hero h2 { font-size: 18px; }
    }
  </style>
</head>
<body>

<div class="top-bar">
  <a href="dashboard-ar.html" class="back-btn"><i class="fas fa-arrow-right"></i></a>
  <a href="dashboard-ar.html" class="logo">EOT<span> PARTNERS</span></a>
  <div style="width:40px;"></div>
</div>

<div class="page-container">

  <!-- Profile Avatar & Name -->

    <div class="avatar-wrapper" onclick="document.getElementById('avatarInput').click()">
      <div class="avatar-circle" id="avatarCircle">

        <img id="avatarImg" src="" style="display:none;">

    </div>
    <input type="file" id="avatarInput" accept="image/*" style="display:none;" onchange="handleAvatar(event)">
    <h2 id="displayName">مستثمر</h2>
    <div class="member-id">معرف العضوية: <span id="memberId">---</span></div>
  </div>

  <!-- Personal Information -->
  <div class="section-card">
    <div class="section-title"><i class="fas fa-id-card"></i> المعلومات الشخصية</div>
    <div class="form-row">
      <div class="form-group">
        <label><i class="fas fa-user"></i> الاسم الأول</label>
        <input type="text" id="firstName" placeholder="الاسم الأول">
      </div>
      <div class="form-group">
        <label><i class="fas fa-user"></i> اسم العائلة</label>
        <input type="text" id="lastName" placeholder="اسم العائلة">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label><i class="fas fa-envelope"></i> البريد الإلكتروني</label>
        <input type="email" id="email" placeholder="example@email.com">
      </div>
      <div class="form-group">
        <label><i class="fas fa-calendar-alt"></i> تاريخ الميلاد</label>
        <input type="date" id="birthDate">
      </div>
    </div>
    <div class="form-group">
      <label><i class="fas fa-phone-alt"></i> رقم الهاتف</label>
      <div class="phone-row">
        <select id="countryCode" class="phone-code">
          <option value="+54">الأرجنتين +54</option><option value="+962">الأردن +962</option><option value="+34">إسبانيا +34</option><option value="+61">أستراليا +61</option><option value="+49">ألمانيا +49</option><option value="+971">الإمارات +971</option><option value="+353">أيرلندا +353</option><option value="+39">إيطاليا +39</option><option value="+973">البحرين +973</option><option value="+55">البرازيل +55</option><option value="+351">البرتغال +351</option><option value="+32">بلجيكا +32</option><option value="+44">بريطانيا +44</option><option value="+48">بولندا +48</option><option value="+216">تونس +216</option><option value="+420">التشيك +420</option><option value="+56">تشيلي +56</option><option value="+90">تركيا +90</option><option value="+213">الجزائر +213</option><option value="+45">الدنمارك +45</option><option value="+7">روسيا +7</option><option value="+40">رومانيا +40</option><option value="+966">السعودية +966</option><option value="+249">السودان +249</option><option value="+46">السويد +46</option><option value="+41">سويسرا +41</option><option value="+963">سوريا +963</option><option value="+964">العراق +964</option><option value="+968">عمان +968</option><option value="+33">فرنسا +33</option><option value="+970">فلسطين +970</option><option value="+358">فنلندا +358</option><option value="+57">كولومبيا +57</option><option value="+1">كندا +1</option><option value="+965">الكويت +965</option><option value="+961">لبنان +961</option><option value="+218">ليبيا +218</option><option value="+212">المغرب +212</option><option value="+52">المكسيك +52</option><option value="+47">النرويج +47</option><option value="+43">النمسا +43</option><option value="+64">نيوزيلندا +64</option><option value="+31">هولندا +31</option><option value="+1">الولايات المتحدة +1</option><option value="+380">أوكرانيا +380</option><option value="+967">اليمن +967</option><option value="+30">اليونان +30</option><option value="+20">مصر +20</option><option value="+974">قطر +974</option>
        </select>
        <input type="tel" id="phone" placeholder="رقم الهاتف" style="flex:1;">

  </div>

  <!-- Address -->
  <div class="section-card">
    <div class="section-title"><i class="fas fa-map-marker-alt"></i> العنوان</div>
    <div class="form-group">
      <label><i class="fas fa-road"></i> عنوان الشارع</label>
      <input type="text" id="street" placeholder="اسم الشارع ورقم المبنى">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label><i class="fas fa-city"></i> المدينة</label>
        <input type="text" id="city" placeholder="المدينة">
      </div>
      <div class="form-group">
        <label><i class="fas fa-mail-bulk"></i> الرمز البريدي</label>

    <div class="form-group">
      <label><i class="fas fa-globe"></i> الدولة</label>
      <select id="country">
        <option value="">اختر الدولة</option>
        <option value="AR">الأرجنتين</option><option value="JO">الأردن</option><option value="ES">إسبانيا</option><option value="AU">أستراليا</option><option value="DE">ألمانيا</option><option value="AE">الإمارات</option><option value="IE">أيرلندا</option><option value="IT">إيطاليا</option><option value="BH">البحرين</option><option value="BR">البرازيل</option><option value="PT">البرتغال</option><option value="BE">بلجيكا</option><option value="GB">بريطانيا</option><option value="PL">بولندا</option><option value="TN">تونس</option><option value="CZ">التشيك</option><option value="CL">تشيلي</option><option value="TR">تركيا</option><option value="DZ">الجزائر</option><option value="DK">الدنمارك</option><option value="RU">روسيا</option><option value="RO">رومانيا</option><option value="SA">السعودية</option><option value="SD">السودان</option><option value="SE">السويد</option><option value="CH">سويسرا</option><option value="SY">سوريا</option><option value="IQ">العراق</option><option value="OM">عمان</option><option value="FR">فرنسا</option><option value="PS">فلسطين</option><option value="FI">فنلندا</option><option value="CO">كولومبيا</option><option value="CA">كندا</option><option value="KW">الكويت</option><option value="LB">لبنان</option><option value="LY">ليبيا</option><option value="MA">المغرب</option><option value="MX">المكسيك</option><option value="NO">النرويج</option><option value="AT">النمسا</option><option value="NZ">نيوزيلندا</option><option value="NL">هولندا</option><option value="US">الولايات المتحدة</option><option value="UA">أوكرانيا</option><option value="YE">اليمن</option><option value="GR">اليونان</option><option value="EG">مصر</option><option value="QA">قطر</option>
      </select>
    </div>
  </div>

  <button class="save-btn" onclick="saveProfile()"><i class="fas fa-save"></i> حفظ التغييرات</button>

  <!-- Account Verification -->
  <div class="section-card" style="margin-top:14px;">
    <div class="section-title"><i class="fas fa-shield-alt"></i> توثيق الحساب</div>

    <div class="verification-status" id="verificationStatus">
      <i class="fas fa-clock"></i>
      <div class="status-text">
        <div class="status-label">حالة التوثيق</div>
        <div id="verificationLabel">لم يتم التوثيق بعد</div>
      </div>

    <div class="upload-box" onclick="document.getElementById('idInput').click()">
      <i class="fas fa-cloud-upload-alt"></i>
      <p>اضغط هنا لرفع صورة الهوية أو جواز السفر</p>
      <p style="font-size:10px;color:#777;">PDF, JPG, PNG - الحد الأقصى 5MB</p>
      <div class="file-name" id="idFileName"></div>

</div>

<div class="toast" id="toast"></div>
<script>
  // ========== Firebase Functions ==========
  function getUserId() {
    const session = JSON.parse(localStorage.getItem('eot_session'));
    return session ? session.id : null;
  }

  async function getUserData() {
    const uid = getUserId();
    if (!uid) return null;
    const doc = await firebase.firestore().collection('users').doc(uid).get();
    return doc.exists ? doc.data() : null;
  }

  async function saveUserData(data) {
    const uid = getUserId();
    if (!uid) return;
    await firebase.firestore().collection('users').doc(uid).update(data);
  }

  const SESSION_KEY = 'eot_session';
  const VERIFICATION_KEY = 'eot_verification';
  let currentVerificationStatus = 'none';

  function showToast(msg, isError = false) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.style.background = isError ? '#7F1D1D' : '#1a1f2b';
    t.style.borderColor = isError ? '#EF4444' : '#D4AF37';
    t.style.display = 'block';
    setTimeout(() => { t.style.display = 'none'; }, 3000);
  }

  // ========== Avatar ==========
  function handleAvatar(event) {
    const file = event.target.files[0];
    if (!file) return;
    if (!file.type.startsWith('image/')) { showToast('يرجى اختيار صورة صالحة', true); return; }
    if (file.size > 2 * 1024 * 1024) { showToast('حجم الصورة يجب أن لا يتجاوز 2 ميجابايت', true); return; }
    const reader = new FileReader();
    reader.onload = function(e) {
      document.getElementById('avatarImg').src = e.target.result;
      document.getElementById('avatarImg').style.display = 'block';
      document.getElementById('avatarLetter').style.display = 'none';
      saveUserData({ 'profile.avatar': e.target.result });
      showToast('تم رفع الصورة الشخصية بنجاح');
    };
    reader.readAsDataURL(file);
  }

  // ========== ID Upload ==========
  function handleIdUpload(event) {
    const file = event.target.files[0];
    if (!file) return;
    if (file.size > 5 * 1024 * 1024) { showToast('حجم الملف يجب أن لا يتجاوز 5 ميجابايت', true); return; }
    document.getElementById('idFileName').textContent = '📄 ' + file.name;
    const reader = new FileReader();
    reader.onload = async function(e) {
      const verification = {
        status: 'pending',
        documentName: file.name,
        documentData: e.target.result,
        uploadDate: new Date().toLocaleDateString('ar-SA'),
        uploadTime: new Date().toLocaleTimeString('ar-SA'),
        email: JSON.parse(localStorage.getItem(SESSION_KEY))?.email || ''
      };
      localStorage.setItem(VERIFICATION_KEY, JSON.stringify(verification));
      await saveUserData({ 'verification.status': 'pending' });
      currentVerificationStatus = 'pending';
      updateVerificationUI();
      showToast('تم رفع وثيقة الهوية بنجاح، حالة التوثيق: قيد المراجعة');
    };
    reader.readAsDataURL(file);
  }

  // ========== Verification UI ==========
  function updateVerificationUI() {
    const container = document.getElementById('verificationStatus');
    container.className = 'verification-status';
    switch (currentVerificationStatus) {
      case 'pending':
        container.classList.add('pending');
        container.innerHTML = '<i class="fas fa-clock"></i><div class="status-text"><div class="status-label">حالة التوثيق</div><div>قيد المراجعة</div></div>';
        break;
      case 'approved':
        container.classList.add('approved');
        container.innerHTML = '<i class="fas fa-check-circle"></i><div class="status-text"><div class="status-label">حالة التوثيق</div><div>تم القبول - حساب موثق</div></div>';
        break;
      case 'rejected':
        container.classList.add('rejected');
        container.innerHTML = '<i class="fas fa-times-circle"></i><div class="status-text"><div class="status-label">حالة التوثيق</div><div>مرفوض - يرجى إعادة المحاولة</div></div>';
        break;
      default:
        container.classList.add('none');
        container.innerHTML = '<i class="fas fa-info-circle"></i><div class="status-text"><div class="status-label">حالة التوثيق</div><div>لم يتم التوثيق بعد</div></div>';
    }
  }

  // ========== Save Profile ==========
  async function saveProfile() {
    const profile = {
      firstName: document.getElementById('firstName').value.trim(),
      lastName: document.getElementById('lastName').value.trim(),
      email: document.getElementById('email').value.trim(),
      birthDate: document.getElementById('birthDate').value,
      phone: document.getElementById('phone').value.trim(),
      countryCode: document.getElementById('countryCode').value,
      street: document.getElementById('street').value.trim(),
      city: document.getElementById('city').value.trim(),
      postalCode: document.getElementById('postalCode').value.trim(),
      country: document.getElementById('country').value
    };

    await saveUserData({ profile: profile });

    const session = JSON.parse(localStorage.getItem(SESSION_KEY));
    if (session) {
      session.firstName = profile.firstName;
      session.lastName = profile.lastName;
      session.fullName = profile.firstName + ' ' + profile.lastName;
      session.email = profile.email;
      localStorage.setItem(SESSION_KEY, JSON.stringify(session));
    }

    updateDisplayName();
    showToast('تم حفظ جميع التغييرات بنجاح');
  }

  // ========== Update Display ==========
  function updateDisplayName() {
    const session = JSON.parse(localStorage.getItem(SESSION_KEY)) || {};
    const fullName = session.fullName || 'مستثمر';
    document.getElementById('displayName').textContent = fullName;
    document.getElementById('avatarLetter').textContent = fullName.charAt(0);
  }

  // ========== Load Profile ==========
  async function loadProfile() {
    const userData = await getUserData();
    const profile = userData?.profile || {};
    const session = JSON.parse(localStorage.getItem(SESSION_KEY)) || {};

    document.getElementById('firstName').value = profile.firstName || session.firstName || '';
    document.getElementById('lastName').value = profile.lastName || session.lastName || '';
    document.getElementById('email').value = profile.email || session.email || '';
    document.getElementById('birthDate').value = profile.birthDate || '';
    document.getElementById('phone').value = profile.phone || '';
    document.getElementById('countryCode').value = profile.countryCode || '+966';
    document.getElementById('street').value = profile.street || '';
    document.getElementById('city').value = profile.city || '';
    document.getElementById('postalCode').value = profile.postalCode || '';
    document.getElementById('country').value = profile.country || '';

    const memberId = session.id ? session.id.substring(0, 8).toUpperCase() : '---';
    document.getElementById('memberId').textContent = memberId;

    if (profile.avatar) {
      document.getElementById('avatarImg').src = profile.avatar;
      document.getElementById('avatarImg').style.display = 'block';
      document.getElementById('avatarLetter').style.display = 'none';
    }

    updateDisplayName();

    currentVerificationStatus = userData?.verification?.status || 'none';
    updateVerificationUI();

    const verification = JSON.parse(localStorage.getItem(VERIFICATION_KEY));
    if (verification?.documentName) {
      document.getElementById('idFileName').textContent = '📄 ' + verification.documentName;
    }
  }

  window.onload = async function() {
    const session = localStorage.getItem(SESSION_KEY);
    if (!session) { window.location.href = 'login.html'; return; }
    loadProfile();
  };
</script>
