<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تسجيل الدخول | EOT PARTNERS</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="firebase-config.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Cairo', 'Segoe UI', Tahoma, sans-serif;
      background: linear-gradient(135deg, #0a0e14 0%, #1a2740 50%, #0a0e14 100%);
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      color: #FFF; padding: 20px;
    }

    .login-container {
      background: rgba(255,255,255,0.03); border: 1px solid rgba(212,175,55,0.2);
      border-radius: 24px; padding: 35px 28px; width: 100%; max-width: 420px;
      backdrop-filter: blur(10px); box-shadow: 0 20px 50px rgba(0,0,0,0.4);
    }

    .logo-section { text-align: center; margin-bottom: 28px; }
    .logo-section .logo { font-size: 26px; font-weight: 800; letter-spacing: 2px; color: #FFF; text-decoration: none; }
    .logo-section .logo span { color: #D4AF37; }
    .logo-section p { font-size: 12px; color: #8E9AAF; margin-top: 6px; }

    .input-group { margin-bottom: 16px; }
    .input-group label { display: block; font-size: 11px; color: #A0AAB8; margin-bottom: 6px; font-weight: 600; }
    .input-group input {
      width: 100%; padding: 14px 16px; background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08); border-radius: 14px;
      color: #FFF; font-size: 14px; font-family: inherit; transition: 0.3s;
    }
    .input-group input:focus { outline: none; border-color: #D4AF37; background: rgba(212,175,55,0.04); }
    .input-group input::placeholder { color: #555; }

    .btn-submit {
      width: 100%; padding: 15px; background: linear-gradient(135deg, #D4AF37, #b8941f);
      color: #000; border: none; border-radius: 14px; font-weight: 700; font-size: 15px;
      cursor: pointer; font-family: inherit; transition: 0.3s; margin-bottom: 12px;
    }
    .btn-submit:hover { background: #e0bc3f; }
    .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }

    .register-link { text-align: center; font-size: 12px; color: #8E9AAF; }
    .register-link a { color: #D4AF37; text-decoration: none; font-weight: 600; }

    .alert-msg {
      padding: 12px 16px; border-radius: 12px; font-size: 12px; text-align: center;
      margin-bottom: 14px; display: none; font-weight: 600;
    }
    .alert-error { background: rgba(248,113,113,0.08); border: 1px solid rgba(248,113,113,0.2); color: #F87171; }
    .alert-success { background: rgba(74,222,128,0.08); border: 1px solid rgba(74,222,128,0.2); color: #4ADE80; }

    .loading-spinner {
      display: none; width: 20px; height: 20px; border: 2px solid rgba(0,0,0,0.3);
      border-top-color: #000; border-radius: 50%; animation: spin 0.6s linear infinite;
      margin: 0 auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div class="login-container">
  <div class="logo-section">
    <a href="dashboard-ar.html" class="logo">EOT<span> PARTNERS</span></a>
    <p>تسجيل الدخول إلى حسابك</p>
  </div>

  <div class="alert-msg" id="alertMsg"></div>

  <div class="input-group">
    <label>البريد الإلكتروني</label>
    <input type="email" id="email" placeholder="example@email.com">
  </div>

  <div class="input-group">
    <label>كلمة المرور</label>
    <input type="password" id="password" placeholder="********">
  </div>

  <button class="btn-submit" id="submitBtn" onclick="handleLogin()">
    <span id="btnText">تسجيل الدخول</span>
    <div class="loading-spinner" id="spinner"></div>
  </button>

  <div class="register-link">
    ليس لديك حساب؟ <a href="register.html">إنشاء حساب جديد</a>
  </div>
</div>

<script>
  function showAlert(msg, type) {
    const el = document.getElementById('alertMsg');
    el.textContent = msg;
    el.className = 'alert-msg ' + (type === 'error' ? 'alert-error' : 'alert-success');
    el.style.display = 'block';
  }

  function setLoading(loading) {
    const btn = document.getElementById('submitBtn');
    const text = document.getElementById('btnText');
    const spinner = document.getElementById('spinner');
    if (loading) {
      btn.disabled = true; text.style.display = 'none'; spinner.style.display = 'block';
    } else {
      btn.disabled = false; text.style.display = 'inline'; spinner.style.display = 'none';
    }
  }

  async function handleLogin() {
    document.getElementById('alertMsg').style.display = 'none';

    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    if (!email) { showAlert('يرجى إدخال البريد الإلكتروني', 'error'); return; }
    if (!password) { showAlert('يرجى إدخال كلمة المرور', 'error'); return; }

    setLoading(true);

    try {
      // 1. تسجيل الدخول عبر Firebase Auth
      const userCredential = await firebase.auth().signInWithEmailAndPassword(email, password);
      const userId = userCredential.user.uid;

      // 2. جلب بيانات المستخدم من Firestore
      const userDoc = await firebase.firestore().collection('users').doc(userId).get();

      if (userDoc.exists) {
        const userData = userDoc.data();

        // 3. حفظ الجلسة محلياً
        const sessionData = {
          id: userId,
          fullName: userData.fullName,
          email: userData.email,
          refCode: userData.refCode,
          joinDate: userData.joinDate
        };
        localStorage.setItem('eot_session', JSON.stringify(sessionData));

        showAlert('تم تسجيل الدخول بنجاح! جاري تحويلك...', 'success');
        setTimeout(() => { window.location.href = 'dashboard-ar.html'; }, 1200);
      } else {
        showAlert('بيانات المستخدم غير موجودة. يرجى إنشاء حساب جديد.', 'error');
      }
    } catch (error) {
      console.error('خطأ في الدخول:', error);
      if (error.code === 'auth/user-not-found') {
        showAlert('لم يتم العثور على حساب بهذا البريد الإلكتروني', 'error');
      } else if (error.code === 'auth/wrong-password') {
        showAlert('كلمة المرور غير صحيحة', 'error');
      } else if (error.code === 'auth/invalid-email') {
        showAlert('صيغة البريد الإلكتروني غير صحيحة', 'error');
      } else if (error.code === 'auth/too-many-requests') {
        showAlert('محاولات كثيرة جداً. يرجى المحاولة لاحقاً', 'error');
      } else {
        showAlert('حدث خطأ أثناء تسجيل الدخول. تأكد من اتصالك بالإنترنت', 'error');
      }
    }

    setLoading(false);
  }
</script>

</body>
</html>
